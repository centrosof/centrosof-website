    <style>
      body { margin: 0; background: #050508; }
      #loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #050508; z-index: 99999; transition: opacity 0.5s ease; }
      #loading.hidden { opacity: 0; pointer-events: none; }
      #loading span { width: 24px; height: 24px; border: 2px solid rgba(99,102,241,0.15); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading"><span></span></div>
    <div id="root"></div>
    <script>
      window.addEventListener('load', () => {
        const el = document.getElementById('loading')
        if (el) setTimeout(() => el.classList.add('hidden'), 200)
      })
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
